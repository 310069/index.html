<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人報告作品集 - 輪播版</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background-color: var(--bg-color); }

        /* 導覽列 */
        header {
            background-color: var(--primary-color);
            padding: 0 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            color: white;
        }

        nav ul { display: flex; list-style: none; }
        .dropdown { position: relative; margin-left: 20px; }
        .dropdown a { color: white; text-decoration: none; font-weight: bold; }
        .dropdown-content {
            display: none;
            position: absolute;
            background: white;
            min-width: 140px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            top: 30px;
            border-radius: 4px;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: #333; padding: 10px; display: block; font-size: 14px; }

        /* 輪播圖容器設定 */
        .carousel-section {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .swiper {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .swiper-slide {
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .swiper-slide img {
            width: 100%;
            height: 70%;
            object-fit: cover; /* 圖片會填滿區塊 */
        }

        .slide-info {
            padding: 15px;
            text-align: center;
        }

        /* 報告列表 */
        .container { max-width: 1100px; margin: 50px auto; padding: 0 20px; }
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">我的專案展示</div>
    <nav>
        <ul>
            <li class="dropdown">
                <a href="#">分類選單 ▾</a>
                <div class="dropdown-content">
                    <a href="#reports">所有報告</a>
                    <a href="#">關於我</a>
                </div>
            </li>
        </ul>
    </nav>
</header>

<div class="carousel-section">
    <h2 style="text-align: center;">精選報告預覽</h2>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://via.placeholder.com/800x400?text=Report+1+Cover" alt="報告1">
                <div class="slide-info">
                    <strong>2024 市場趨勢分析</strong> - 點擊下方卡片查看全文
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://via.placeholder.com/800x400?text=Report+2+Cover" alt="報告2">
                <div class="slide-info">
                    <strong>永續發展研究報告</strong> - 關鍵數據圖表預覽
                </div>
            </div>
            <div class="swiper-slide">
                <img src="https://via.placeholder.com/800x400?text=Report+3+Cover" alt="報告3">
                <div class="slide-info">
                    <strong>UI/UX 使用者調查</strong> - 訪談結果摘要
                </div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</div>

<div class="container" id="reports">
    <h3>全部報告列表</h3>
    <div class="report-grid">
        <div class="card">
            <h3>2024 市場趨勢分析</h3>
            <p>這份報告探討了 AI 在電商領域的應用...</p>
            <a href="#" class="btn">下載 PDF</a>
        </div>
        <div class="card">
            <h3>永續發展研究</h3>
            <p>針對城市綠化與碳中和政策的分析...</p>
            <a href="#" class="btn">線上閱讀</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    const swiper = new Swiper('.swiper', {
        loop: true, // 循環播放
        autoplay: {
            delay: 3000, // 3秒切換一次
        },
        pagination: {
            el: '.swiper-pagination',
            clickable: true,
        },
        navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
    });
</script>

</body>
</html>
